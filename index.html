<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="keywords" content="الشعر العربي, قصائد عربية, قصائد حب, قصائد غزل, قصائد رومانسية, قصائد شوق, قصائد مدح, قصائد حكمة, قصائد حزينة, قصائد فراق, قصائد رثاء, قصائد عتاب, قصائد ذم, المعلقات">
<title>اكتب قصيدتك وشاركها مع الجميع | Gema+Price</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="منصة عربية لكتابة ومشاركة القصائد والخواطر. عبّر عن إحساسك الآن.">
<link rel="icon" href="face10.jpg">
<link rel="stylesheet" href="css.css">
<link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">

</head>

<body>

<!-- Loader -->
<div id="loader">⏳ جاري التحميل...</div>

<!-- Welcome -->
<div id="welcomeBox" class="popup">
  <div class="popup-box">
    <h3>🌟 أهلاً بك</h3>
    <p>اكتب قصيدتك وشارك إحساسك مع العالم ❤️</p>
    <button onclick="closeWelcome()" class="btn">ابدأ الآن 🚀</button>
  </div>
</div>

<!-- Header -->
<header class="header">
  <h1 class="logo-text">اكتب قصيدتك… ودع العالم يشعر بك ❤️</h1>

  <div id="userBox">غير مسجل</div>

  <div class="actions">
    <button class="btn" onclick="login()">🔐 تسجيل دخول</button>

    <div class="online-box">
      👀 <span id="onlineCount">0</span> متصل الآن
    </div>
  </div>
</header>

<!-- Hero -->
<div class="hero">
  <h2>شارك مشاعرك… واكتشف أجمل القصائد</h2>
  <p>منصة عربية تجمع كل من يحب الشعر ❤️</p>
  <button class="btn add" onclick="openAddPopup()">✍️ اكتب أول قصيدة لك الآن</button>
</div>

<!-- Categories -->
<div class="categories">
  <a href="love-poems.html" class="cat-btn">❤️ حب</a>
  <a href="sad-poems.html" class="cat-btn">😢 حزن</a>
  <a href="missing-messages.html" class="cat-btn">🔥 شوق</a>
  <a href="romantic-messages.html" class="cat-btn">🌅 خواطر</a>
</div>

<!-- Container -->
<div class="container"></div>

<!-- Popup كتابة -->
<div id="popup" class="popup">
  <div class="popup-box">

    <h2 class="popup-title">✍️ عبّر عن إحساسك</h2>
    <p class="popup-sub">اكتب ما بداخلك… فالكلمات لها روح ❤️</p>

    <!-- عنوان -->
    <input id="price" class="input" placeholder="📌 عنوان القصيدة">

    <!-- التصنيف -->
    <select id="poemCategory" class="input">
      <option value="حب">❤️ حب</option>
      <option value="حزن">😢 حزن</option>
      <option value="خواطر">🌅 خواطر</option>
      <option value="شوق">🔥 شوق</option>
    </select>

    <!-- النص -->
    <textarea id="name" class="textarea" placeholder="ابدأ بكتابة قصيدتك هنا... لا تفكر كثيراً، فقط اكتب ✨"></textarea>

    <!-- الأزرار -->
    <div class="popup-actions">
      <button class="btn publish" onclick="saveItem()">🚀 نشر القصيدة</button>
      <button type="button" class="btn close" onclick="closePopup()">❌ إغلاق</button>
    </div>

  </div>
</div>

<!-- Firebase Script -->
<script type="module" src="script.js"></script>

<!-- Script بسيط -->
<script>
window.onload = () => {
  document.getElementById("loader").style.display = "none";

  const welcome = document.getElementById("welcomeBox");
  if (!localStorage.getItem("welcomeShown")) {
    welcome.style.display = "flex";
    localStorage.setItem("welcomeShown", "true");
  }
};

function closeWelcome() {
  document.getElementById("welcomeBox").style.display = "none";
}
</script>

</body>
</html>
