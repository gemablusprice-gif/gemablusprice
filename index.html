<!DOCTYPE html>

<div id="welcomeBox" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:flex;
justify-content:center;
align-items:center;
z-index:999;
">

  <div style="
  background:white;
  padding:20px;
  border-radius:20px;
  text-align:center;
  width:300px;
  ">
  
    <h3>🌟 أهلاً بيك</h3>
    <p>
      اكتب قصيدتك ✍️<br>
      وشاركنا إحساسك ❤️
    </p>

    <button onclick="closeWelcome()" class="btn">دخول 🚀</button>

  </div>
</div>
<style>
body {
  font-family: Arial;
  direction: rtl;
  background: linear-gradient(135deg, #f5f7fa, #e4e7eb);
  margin: 0;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(114, 10, 173, 0.9);
  padding: 15px 20px;
  backdrop-filter: blur(10px);
}

.logo-text {
  color: rgb(255, 255, 255);
  font-size: 24px;
  font-weight: bold;
}

/* buttons */
.btn {
  border: none;
  padding: 8px 15px;
  border-radius: 25px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
}

.login {
  background: transparent;
  color: gold;
  border: 1px solid gold;
}

.add {
  background: linear-gradient(45deg, gold, orange);
  color: black;
  font-weight: bold;
}

/* PRODUCTS */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px,1fr));
  gap: 15px;
  padding: 20px;
  max-width: 1200px;
  margin: auto;
}

/* CARD */
.item {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(12px);
  padding: 15px;
  border-radius: 20px;
  text-align: center;

  height: auto;
  display: flex;
  flex-direction: column;
}

.item:hover {
  transform: translateY(-6px);
  box-shadow: 0 15px 30px rgba(0,0,0,0.15);
}

.item h3 {
  margin-bottom: 10px;
}

.actions-row {
  margin-top: auto; /* 🔥 يخلي الأزرار تحت */
}

.item p {
  color: #333;
  font-size: 17px;
  line-height: 2;
  white-space: pre-line;

  word-break: break-word;   /* 🔥 مهم جدًا */
}
/* IMAGE */
img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 15px;
}

/* ACTIONS */
.actions-row {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 12px;
}

/* ❤️ LIKE */
.like-btn {
  border: none;
  background: #ffe5ec;
  color: #ff2e63;
  padding: 8px 12px;
  border-radius: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: 0.2s;
}

.like-btn:hover {
  transform: scale(1.1);
}

.like-btn.liked {
  animation: pop 0.3s ease;
}

/* 😊 SMILE */
.smile-btn {
  border: none;
  background: #fff4cc;
  color: #ff9800;
  padding: 8px 12px;
  border-radius: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: 0.2s;
}

.smile-btn:hover {
  transform: scale(1.1) rotate(5deg);
}

.smile-btn.active {
  animation: bounce 0.3s ease;
}

/* ANIMATION */
@keyframes pop {
  0% {transform: scale(1);}
  50% {transform: scale(1.4);}
  100% {transform: scale(1);}
}

@keyframes bounce {
  0% {transform: scale(1);}
  50% {transform: scale(1.5);}
  100% {transform: scale(1);}
}

/* POPUP */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
}

.popup-box textarea {
  width: 100%;
  height: 180px;              /* 🔥 مساحة كبيرة */
  margin: 10px 0;
  padding: 12px;
  border-radius: 15px;
  border: none;
  resize: none;
  font-size: 16px;
  line-height: 1.8;           /* 🔥 مريح للشعر */
  direction: rtl;
  background: rgba(255,255,255,0.8);
}

/* تأثير عند الكتابة */
.popup-box textarea:focus {
  outline: none;
  box-shadow: 0 0 10px gold;
}

.popup-box h3 {
  color: gold;
}

.popup-box input {
  width: 100%;
  margin: 8px 0;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

/* VIEW */
.view-box {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(10px);
  display: none;
  justify-content: center;
  align-items: center;
}

.view-content {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  padding: 20px;
  width: 350px;
  max-width: 90%;
}

.view-content img {
  width: 100%;
  max-height: 250px;
  border-radius: 15px;
  object-fit: cover;
}
.categories {
  display: flex;
  gap: 10px;
  padding: 10px;
  overflow-x: auto; /* 🔥 سكرول أفقي */
  scrollbar-width: none;
}

.categories::-webkit-scrollbar {
  display: none;
}

/* الزر */
.cat-btn {
  border: none;
  padding: 8px 15px;
  border-radius: 20px;
  background: #eee;
  cursor: pointer;
  white-space: nowrap;
  transition: 0.3s;
  font-size: 14px;
}

/* hover */
.cat-btn:hover {
  transform: scale(1.1);
}

/* الزر النشط */
.cat-btn.active {
  background: linear-gradient(45deg, gold, orange);
  color: black;
  font-weight: bold;
}
.popup-logo {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  box-shadow: 0 0 25px gold, 0 0 50px orange;
  display: block;
  margin: 0 auto 20px;

  animation: moveSpin 4s linear infinite;
}

@keyframes moveSpin {
  0% {
    transform: rotate(0deg) translateY(0);
  }
  50% {
    transform: rotate(180deg) translateY(-15px);
  }
  100% {
    transform: rotate(360deg) translateY(0);
  }
}
</style>
</head>

<body>

<header class="header">
  <h2 class="logo-text">Gema+Price</h2>
  <div class="actions">
    <button class="btn" onclick="myPosts()">📦 منشوراتي</button>
    <button class="btn login" onclick="login()">🔐 تسجيل دخول</button>
    <button class="btn add" onclick="openAddPopup()">➕ شاركناء قصايدك</button>
</header>
</div>
  <div id="category">
  <button onclick="selectCategory('حب', this)" class="cat-btn">❤️ حب</button>
<button onclick="selectCategory('حزن', this)" class="cat-btn">😢 حزن</button>
<button onclick="selectCategory('خواطر', this)" class="cat-btn">🌅 خواطر</button>
<button onclick="selectCategory('حكم', this)" class="cat-btn">🧠 حكم</button>
<button onclick="selectCategory('شوق', this)" class="cat-btn">🔥 شوق</button>
</div>

<div class="container"></div>

<!-- POPUP -->
<div id="popup" class="popup">

  <div class="popup-box">

    <img src="face10.jpg" class="popup-logo">

    <h3>➕ اكتب الشعرك</h3>

    <textarea id="name" placeholder="✍️ اكتب قصيدتك هنا..." rows="6"></textarea>
    <input id="price" placeholder="📝 عنوان القصيدة">

    <div class="popup-actions">
      <button class="btn save" onclick="saveItem()">💾 حفظ</button>
      <button class="btn cancel" onclick="closePopup()">❌</button>
</div>
  </div>
<div id="notify" style="
position:fixed;
top:20px;
right:20px;
background:black;
color:gold;
padding:10px;
border-radius:10px;
display:none;
"></div>
</div>
<h1 style="text-align:center;">Welcome to Gema+Price</h1>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getFirestore, collection, addDoc, getDocs,
  doc, updateDoc, increment,
  query, where, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
  getAuth, signInWithPopup, GoogleAuthProvider
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* Firebase */
const firebaseConfig = {
  apiKey: "AIzaSyAjHSw-cDIn5Exn2zM7s2-l-_dNdwZiH6E",
  authDomain: "gemablusprice-a2663.firebaseapp.com",
  projectId: "gemablusprice-a2663",
  storageBucket: "gemablusprice-a2663.firebasestorage.app",
  messagingSenderId: "922754795410",
  appId: "1:922754795410:web:4c4f3e73e4ac4c9008a34b",
  measurementId: "G-86PJQG21C1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const container = document.querySelector(".container");
const popup = document.getElementById("popup");

/* ✅ المتغير */
let selectedCategory = "عام";

window.closeWelcome = function(){
  document.getElementById("welcomeBox").style.display = "none";
};


/* 🔐 تسجيل دخول */
window.login = async function() {
  try {
    const provider = new GoogleAuthProvider();
    const result = await signInWithPopup(auth, provider);

    const user = result.user;

    const q = query(collection(db,"users"), where("uid","==", user.uid));
    const snap = await getDocs(q);

    if(snap.empty){
      let name = prompt("اكتب اسمك 👇");
      if(!name) return alert("لازم تكتب اسم");

      await addDoc(collection(db,"users"),{
        uid: user.uid,
        name
      });
    }

    loadItems();

  } catch(e){
    alert(e.message);
  }
};

/* popup */
window.openAddPopup = () => popup.style.display="flex";
window.closePopup = () => popup.style.display="none";

/* 🎯 اختيار القسم */
window.selectCategory = function(cat, el){
  selectedCategory = cat;

  document.querySelectorAll(".cat-btn").forEach(btn=>{
    btn.classList.remove("active");
  });

  el.classList.add("active");
};

/* ➕ حفظ القصيدة */
window.saveItem = async function(){
  try {
    let poem = document.getElementById("name").value.trim();
    let title = document.getElementById("price").value.trim();

    if (!auth.currentUser){
      alert("سجل دخول الأول 🔐");
      return;
    }

    if (!poem || !title){
      alert("اكتب القصيدة والعنوان ✍️");
      return;
    }

    await addDoc(collection(db,"products"),{
      name: poem,
      price: title,
      category: selectedCategory,
      uid: auth.currentUser.uid,
      likes: 0,
      smiles: 0
    });

    alert("✅ تم حفظ القصيدة");

    document.getElementById("name").value = "";
    document.getElementById("price").value = "";

    closePopup();
    loadItems();

  } catch(e){
    alert(e.message);
  }
};

/* ❤️ لايك */
function createLikeButton(data,id){
  let btn = document.createElement("button");
  btn.className = "like-btn";
  btn.innerHTML = `❤️ <span>${data.likes || 0}</span>`;

  btn.onclick = async ()=>{
    await updateDoc(doc(db,"products",id),{
      likes: increment(1)
    });
    loadItems();
  };

  return btn;
}

/* 😊 مبتسم */
function createSmileButton(data,id){
  let btn = document.createElement("button");
  btn.className = "smile-btn";
  btn.innerHTML = `😊 <span>${data.smiles || 0}</span>`;

  btn.onclick = async ()=>{
    await updateDoc(doc(db,"products",id),{
      smiles: increment(1)
    });
    loadItems();
  };

  return btn;
}

/* 🗑 حذف */
window.deleteItem = async function(id){
  let ok = confirm("متأكد تحذف القصيدة؟ 🗑");
  if(!ok) return;

  try {
    await deleteDoc(doc(db,"products",id));
    alert("✅ تم الحذف");
    myPosts();
  } catch(e){
    alert(e.message);
  }
};

/* 📦 عرض كل القصايد */
async function loadItems(){
  container.innerHTML = "";

  const snap = await getDocs(collection(db,"products"));

  snap.forEach(docSnap=>{
    let data = docSnap.data();
    let id = docSnap.id;

    let div = document.createElement("div");
    div.className = "item";

    let title = document.createElement("h3");
    title.innerText = data.price;

    let cat = document.createElement("p");
    cat.innerText = data.category || "عام";
    cat.style.background = "rgba(255,215,0,0.2)";
    cat.style.padding = "3px 8px";
    cat.style.borderRadius = "10px";

    let poem = document.createElement("p");
    poem.innerText = data.name;

    let actions = document.createElement("div");
    actions.className = "actions-row";

    actions.append(
      createLikeButton(data,id),
      createSmileButton(data,id)
    );

    div.append(title, cat, poem, actions);
    container.appendChild(div);
  });
}

/* 📦 منشوراتي */
window.myPosts = async function(){

  if (!auth.currentUser){
    alert("سجل دخول الأول");
    return;
  }

  container.innerHTML = "";

  const snap = await getDocs(collection(db,"products"));

  snap.forEach(docSnap=>{
    let data = docSnap.data();

    if(data.uid !== auth.currentUser.uid) return;

    let div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <h3>${data.price}</h3>
      <p style="white-space:pre-line">${data.name}</p>
      <p>❤️ ${data.likes || 0}</p>
      <p>😊 ${data.smiles || 0}</p>
      <button class="btn" onclick="deleteItem('${docSnap.id}')">🗑 حذف</button>
    `;

    container.appendChild(div);
  });
}

/* تشغيل أولي */
loadItems();

</script>

</body>
</html>
